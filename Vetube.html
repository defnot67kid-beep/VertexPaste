<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VertiFlow — Video Social Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Video.js for HLS & advanced player -->
    <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121c;
            --bg-elevated: #1c1c2a;
            --accent: #ec4899;
            --accent-glow: #ec4899cc;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #2a2a3a;
            --success: #10b981;
            --danger: #ef4444;
            --video-highlight: #ff2d75;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* custom scroll */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 18px 24px;
        }

        /* navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(18, 18, 28, 0.9);
            backdrop-filter: blur(14px);
            border-radius: 50px;
            padding: 10px 28px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f472b6, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-buttons { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
        .btn {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: var(--bg-elevated);
            color: var(--text-primary);
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--accent); box-shadow: 0 2px 12px rgba(236,72,153,0.3); }
        .btn-primary:hover { background: #f43f9e; transform: translateY(-2px); }
        .btn-outline { border: 1px solid var(--accent); background: transparent; }
        .user-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* main grid: video feed + sidebar */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 28px;
        }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

        /* video card */
        .video-card {
            background: var(--bg-card);
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 32px;
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        .video-container {
            position: relative;
            background: #000;
            width: 100%;
        }
        .video-js {
            width: 100%;
            border-radius: 24px 24px 0 0;
        }
        .video-info {
            padding: 18px 20px;
        }
        .video-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
        .channel-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }
        .channel-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .channel-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
        .stats { display: flex; gap: 18px; color: var(--text-secondary); font-size: 0.8rem; margin-top: 10px; }
        .action-buttons { display: flex; gap: 18px; margin-top: 14px; }
        .like-btn, .comment-toggle { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; display: flex; gap: 6px; align-items: center; }

        /* comments */
        .comments-area {
            padding: 0 20px 20px;
            border-top: 1px solid var(--border);
            margin-top: 10px;
            display: none;
        }
        .comment-item {
            background: var(--bg-elevated);
            border-radius: 20px;
            padding: 10px 14px;
            margin-bottom: 12px;
        }

        /* sidebar */
        .sidebar-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .trending-list .trending-item {
            display: flex;
            gap: 12px;
            padding: 8px 0;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }

        /* modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: var(--bg-card);
            border-radius: 32px;
            max-width: 550px;
            width: 90%;
            padding: 28px;
            border: 1px solid var(--accent);
        }
        input, textarea, select {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 12px 16px;
            color: white;
            margin-bottom: 16px;
        }
        .aspect-preview {
            background: #1e1e2e;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            font-size: 0.8rem;
        }

        /* channel header */
        .channel-header {
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            border-radius: 32px;
            padding: 30px;
            margin-bottom: 30px;
            display: flex;
            gap: 28px;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid var(--border);
        }
        .channel-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
        }
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-elevated);
            padding: 10px 22px;
            border-radius: 60px;
            border-left: 4px solid var(--accent);
            z-index: 2200;
        }
    </style>
</head>
<body>
<div class="app-container">
    <nav class="navbar">
        <div class="logo"><i class="fas fa-video"></i> VertiFlow</div>
        <div class="nav-buttons" id="navButtons"></div>
    </nav>
    <div id="mainContent"></div>
</div>

<!-- Auth Modal -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom: 20px;"><i class="fas fa-user-astronaut"></i> Join VertiFlow</h3>
        <div style="display: flex; gap: 12px; margin-bottom: 20px;">
            <button id="authLoginTab" class="btn btn-primary" style="flex:1">Login</button>
            <button id="authSignupTab" class="btn" style="flex:1; background:#1f1f2e">Sign Up</button>
        </div>
        <div id="loginPanel">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPass" placeholder="Password">
            <button class="btn btn-primary" style="width:100%" id="doLoginBtn">Login</button>
            <button class="btn" style="width:100%; margin-top:12px; background:#fff; color:#000;" id="googleLoginBtn"><i class="fab fa-google"></i> Google</button>
        </div>
        <div id="signupPanel" style="display:none">
            <input type="text" id="signupName" placeholder="Channel Name">
            <input type="email" id="signupEmail" placeholder="Email">
            <input type="password" id="signupPass" placeholder="Password (min 6)">
            <button class="btn btn-primary" style="width:100%" id="doSignupBtn">Create Channel</button>
        </div>
    </div>
</div>

<!-- Upload Video Modal -->
<div id="uploadModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-upload"></i> Upload New Video</h3>
        <input type="text" id="videoTitle" placeholder="Video title">
        <textarea id="videoDesc" rows="2" placeholder="Description"></textarea>
        <input type="file" id="videoFile" accept="video/mp4,video/quicktime,video/webm">
        <div class="aspect-preview" id="aspectInfo">Auto-detects Shorts (9:16) or Landscape (16:9) → player style</div>
        <div style="display: flex; gap: 12px; justify-content: flex-end;">
            <button class="btn" onclick="closeUploadModal()">Cancel</button>
            <button class="btn btn-primary" id="confirmUploadBtn">Publish Video</button>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
            "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, updateProfile } from "firebase/auth";
    import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, arrayUnion, arrayRemove, query, orderBy, onSnapshot, Timestamp, addDoc, deleteDoc, where } from "firebase/firestore";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "firebase/storage";

    const firebaseConfig = {
        apiKey: "AIzaSyAupBkllyicDPD9O6CmX4mS4sF5z96mqxc",
        authDomain: "vertexpaste.firebaseapp.com",
        projectId: "vertexpaste",
        storageBucket: "vertexpaste.firebasestorage.app",
        messagingSenderId: "255275350380",
        appId: "1:255275350380:web:7be4e8add2cb5b04045b49"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const googleProvider = new GoogleAuthProvider();

    let currentUser = null;
    let allVideos = [];
    let currentChannelView = null; // uid of channel being viewed

    // Helper
    function showToast(msg) {
        const t = document.createElement("div");
        t.className = "toast";
        t.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2800);
    }

    // detect aspect ratio from video file (client-side)
    function getVideoAspectRatio(file) {
        return new Promise((resolve) => {
            const video = document.createElement("video");
            video.preload = "metadata";
            video.onloadedmetadata = () => {
                const ratio = video.videoWidth / video.videoHeight;
                if (ratio < 0.7) resolve("shorts");      // 9:16 approx vertical
                else if (ratio > 1.5) resolve("landscape"); // 16:9
                else resolve("square");
                URL.revokeObjectURL(video.src);
            };
            video.src = URL.createObjectURL(file);
        });
    }

    // upload video to storage, return url
    async function uploadVideo(file, userId, videoId) {
        const storageRef = ref(storage, `videos/${userId}/${videoId}.mp4`);
        await uploadBytes(storageRef, file);
        return await getDownloadURL(storageRef);
    }

    // Publish video
    window.publishVideo = async function() {
        const title = document.getElementById("videoTitle").value.trim();
        const desc = document.getElementById("videoDesc").value.trim();
        const file = document.getElementById("videoFile").files[0];
        if (!title || !file) { showToast("Title and video required"); return; }
        const aspect = await getVideoAspectRatio(file);
        const videoId = Date.now().toString() + Math.random().toString(36).substr(2, 6);
        showToast("Uploading video...");
        const videoUrl = await uploadVideo(file, currentUser.uid, videoId);
        const newVideo = {
            videoId, title, description: desc,
            userId: currentUser.uid,
            channelName: currentUser.displayName,
            channelAvatar: currentUser.photoURL || null,
            videoUrl: videoUrl,
            aspectRatio: aspect,
            createdAt: Timestamp.now(),
            likes: [],
            comments: [],
            views: 0
        };
        await addDoc(collection(db, "videos"), newVideo);
        document.getElementById("uploadModal").style.display = "none";
        document.getElementById("videoTitle").value = "";
        document.getElementById("videoDesc").value = "";
        document.getElementById("videoFile").value = "";
        showToast("Video published!");
    };

    // Render main feed or channel view
    async function renderApp() {
        if (!currentUser) {
            document.getElementById("mainContent").innerHTML = `<div style="text-align:center; margin-top:80px;"><i class="fas fa-clapperboard" style="font-size:70px; color:var(--accent);"></i><h2>VertiFlow — Video Universe</h2><button class="btn btn-primary" id="startBtn">Start Creating</button></div>`;
            document.getElementById("startBtn")?.addEventListener("click", () => document.getElementById("authModal").style.display = "flex");
            return;
        }
        // if viewing specific channel (hash route)
        const hash = window.location.hash;
        if (hash.startsWith("#@") || hash.startsWith("#channel-")) {
            let usernameOrUid = hash.replace("#@", "").replace("#channel-", "");
            await renderChannelPage(usernameOrUid);
        } else {
            await renderGlobalFeed();
        }
    }

    async function renderGlobalFeed() {
        const videosQuery = query(collection(db, "videos"), orderBy("createdAt", "desc"));
        onSnapshot(videosQuery, async (snap) => {
            allVideos = [];
            snap.forEach(d => allVideos.push({ id: d.id, ...d.data() }));
            await buildFeedHtml();
        });
    }

    async function buildFeedHtml() {
        if (!currentUser) return;
        let feedHtml = `<div class="main-grid"><div>`;
        feedHtml += `<div style="display:flex; justify-content:space-between; margin-bottom:24px;"><h2><i class="fas fa-fire"></i> Video Stream</h2><button class="btn btn-primary" id="uploadVideoBtn"><i class="fas fa-plus-circle"></i> Upload Video</button></div>`;
        for (const vid of allVideos) {
            const isLiked = vid.likes?.includes(currentUser.uid) || false;
            const likeCount = vid.likes?.length || 0;
            const commentCount = vid.comments?.length || 0;
            const aspectClass = vid.aspectRatio === "shorts" ? "short-video" : "wide-video";
            feedHtml += `
            <div class="video-card" data-video-id="${vid.id}">
                <div class="video-container">
                    <video id="player-${vid.videoId}" class="video-js vjs-big-play-centered" controls preload="metadata" data-setup='{}'>
                        <source src="${vid.videoUrl}" type="video/mp4">
                    </video>
                </div>
                <div class="video-info">
                    <div class="video-title">${escapeHtml(vid.title)}</div>
                    <div class="channel-row">
                        <div class="channel-badge" onclick="navigateToChannel('${vid.userId}', '${escapeHtml(vid.channelName)}')">
                            <img class="channel-avatar" src="${vid.channelAvatar || 'https://ui-avatars.com/api/?background=ec4899&color=fff&name='+vid.channelName?.charAt(0)}">
                            <span>${escapeHtml(vid.channelName)}</span>
                        </div>
                        <div class="stats"><span><i class="fas fa-eye"></i> ${vid.views || 0}</span></div>
                    </div>
                    <div class="action-buttons">
                        <button class="like-btn" data-id="${vid.id}"><i class="fas ${isLiked ? 'fa-heart' : 'fa-heart'}" style="color:${isLiked ? '#ec4899' : ''}"></i> <span>${likeCount}</span></button>
                        <button class="comment-toggle" data-id="${vid.id}"><i class="fas fa-comment"></i> ${commentCount}</button>
                    </div>
                </div>
                <div class="comments-area" id="comments-${vid.id}" style="display:none;">
                    ${(vid.comments || []).map(c => `<div class="comment-item"><strong>${escapeHtml(c.displayName)}</strong><div>${escapeHtml(c.text)}</div><small>${new Date(c.timestamp).toLocaleString()}</small></div>`).join('')}
                    <div class="add-comment" style="display:flex; gap:8px; margin-top:12px;">
                        <input type="text" id="commentInput-${vid.id}" placeholder="Write comment..." style="flex:1; margin:0;">
                        <button class="btn btn-primary comment-submit" data-id="${vid.id}" style="padding:6px 16px;">Post</button>
                    </div>
                </div>
            </div>`;
        }
        feedHtml += `</div><div class="sidebar"><div class="sidebar-card"><h4><i class="fas fa-chart-line"></i> Trending</h4><div class="trending-list">${allVideos.slice(0,5).map(v => `<div class="trending-item" onclick="scrollToVideo('${v.id}')">🔥 ${escapeHtml(v.title)}</div>`).join('')}</div></div><div class="sidebar-card"><h4><i class="fas fa-user-plus"></i> Your Channel</h4><button class="btn btn-outline" id="myChannelBtn" style="width:100%;"><i class="fas fa-id-card"></i> View My Channel</button></div></div></div>`;
        document.getElementById("mainContent").innerHTML = feedHtml;
        // initialize video players dynamically
        allVideos.forEach(vid => {
            const playerEl = document.getElementById(`player-${vid.videoId}`);
            if (playerEl && !playerEl.player) {
                const player = videojs(playerEl, { responsive: true, fluid: true });
                player.ready(() => {
                    if (vid.aspectRatio === "shorts") {
                        playerEl.style.aspectRatio = "9/16";
                        playerEl.style.maxHeight = "70vh";
                    } else {
                        playerEl.style.aspectRatio = "16/9";
                    }
                });
            }
        });
        // attach like + comment events
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const videoDocId = btn.dataset.id;
                const videoRef = doc(db, "videos", videoDocId);
                const snap = await getDoc(videoRef);
                if(snap.exists()){
                    const likes = snap.data().likes || [];
                    if(likes.includes(currentUser.uid)){
                        await updateDoc(videoRef, { likes: arrayRemove(currentUser.uid) });
                    } else {
                        await updateDoc(videoRef, { likes: arrayUnion(currentUser.uid) });
                    }
                }
            });
        });
        document.querySelectorAll('.comment-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const pid = btn.dataset.id;
                const div = document.getElementById(`comments-${pid}`);
                if(div) div.style.display = div.style.display === 'none' ? 'block' : 'none';
            });
        });
        document.querySelectorAll('.comment-submit').forEach(btn => {
            btn.addEventListener('click', async () => {
                const videoId = btn.dataset.id;
                const input = document.getElementById(`commentInput-${videoId}`);
                const text = input.value.trim();
                if(!text) return;
                const videoRef = doc(db, "videos", videoId);
                const newComment = { uid: currentUser.uid, displayName: currentUser.displayName, text: text, timestamp: new Date().toISOString() };
                await updateDoc(videoRef, { comments: arrayUnion(newComment) });
                input.value = "";
                showToast("Comment added");
            });
        });
        document.getElementById("uploadVideoBtn")?.addEventListener("click", () => document.getElementById("uploadModal").style.display = "flex");
        document.getElementById("myChannelBtn")?.addEventListener("click", () => navigateToChannel(currentUser.uid, currentUser.displayName));
    }

    // CHANNEL PAGE with custom routing: #@username or #channel-UID
    async function renderChannelPage(identifier) {
        let targetUser = null;
        // find user by username or uid
        const usersSnap = await getDocs(collection(db, "users"));
        for (const docSnap of usersSnap) {
            const data = docSnap.data();
            if (data.username === identifier || docSnap.id === identifier || (data.displayName && data.displayName.toLowerCase() === identifier.toLowerCase())) {
                targetUser = { uid: docSnap.id, ...data };
                break;
            }
        }
        if (!targetUser) { showToast("Channel not found"); window.location.hash = ""; renderApp(); return; }
        // fetch user's videos
        const videosQuery = query(collection(db, "videos"), where("userId", "==", targetUser.uid), orderBy("createdAt", "desc"));
        const snap = await getDocs(videosQuery);
        const userVideos = [];
        snap.forEach(d => userVideos.push({ id: d.id, ...d.data() }));
        const channelUrl = `https://defnot67kid-beep.github.io/VertexPaste/Vetube.html#@${targetUser.username || targetUser.displayName?.replace(/\s/g, '') || targetUser.uid}`;
        const shortLink = channelUrl;
        const html = `
            <div class="channel-header">
                <img class="channel-avatar-large" src="${targetUser.photoURL || 'https://ui-avatars.com/api/?background=ec4899&color=fff&name='+targetUser.displayName?.charAt(0)}">
                <div><h1>${escapeHtml(targetUser.displayName || "Creator")}</h1><p>${targetUser.bio || "Video creator on VertiFlow"}</p><div style="margin-top:10px;"><input id="shareChannelInput" value="${shortLink}" readonly style="width:260px; background:#2a2a3a;"><button class="btn btn-primary" onclick="copyChannelLink()">Copy URL</button></div></div>
            </div>
            <div><h3><i class="fas fa-film"></i> Uploads (${userVideos.length})</h3><div style="display:grid; gap:24px; margin-top:20px;">${userVideos.map(v => `<div class="video-card"><video controls style="width:100%; border-radius:20px;" src="${v.videoUrl}"></video><div class="video-info"><strong>${escapeHtml(v.title)}</strong><div>❤️ ${v.likes?.length||0}  💬 ${v.comments?.length||0}</div></div></div>`).join('')}</div></div>
            <button class="btn" style="margin-top:30px;" onclick="window.location.hash=''">← Back to Feed</button>
        `;
        document.getElementById("mainContent").innerHTML = html;
    }

    window.navigateToChannel = (uid, name) => {
        const username = name?.toLowerCase().replace(/\s/g, '') || uid.slice(-8);
        window.location.hash = `@${username}`;
        renderApp();
    };
    window.copyChannelLink = () => {
        const input = document.getElementById("shareChannelInput");
        if(input) { input.select(); navigator.clipboard.writeText(input.value); showToast("Channel link copied!"); }
    };
    window.scrollToVideo = (id) => { document.getElementById(`player-${id}`)?.scrollIntoView({ behavior: "smooth" }); };

    // Auth handlers
    function updateNav() {
        const navDiv = document.getElementById("navButtons");
        if(currentUser){
            navDiv.innerHTML = `<span style="display:flex; align-items:center; gap:8px;"><img class="user-avatar" src="${currentUser.photoURL || `https://ui-avatars.com/api/?background=ec4899&color=fff&name=${currentUser.displayName?.charAt(0)}`}" width="32"> ${currentUser.displayName}</span><button class="btn btn-primary" id="logoutNavBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>`;
            document.getElementById("logoutNavBtn")?.addEventListener("click", () => signOut(auth));
        } else {
            navDiv.innerHTML = `<button class="btn btn-primary" id="showAuthNav"><i class="fas fa-user-plus"></i> Sign in</button>`;
            document.getElementById("showAuthNav")?.addEventListener("click", () => document.getElementById("authModal").style.display = "flex");
        }
    }

    onAuthStateChanged(auth, async (user) => {
        if(user){
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            if(!snap.exists()){
                let username = user.displayName?.toLowerCase().replace(/\s/g, '') || user.email.split('@')[0];
                await setDoc(userRef, {
                    displayName: user.displayName || user.email.split('@')[0],
                    email: user.email,
                    photoURL: user.photoURL,
                    username: username,
                    bio: "",
                    createdAt: Timestamp.now()
                });
            }
            currentUser = { uid: user.uid, displayName: user.displayName || user.email.split('@')[0], email: user.email, photoURL: user.photoURL };
            updateNav();
            renderApp();
        } else {
            currentUser = null;
            updateNav();
            renderApp();
        }
    });
    // modal triggers
    document.getElementById("authLoginTab")?.addEventListener("click", () => { document.getElementById("loginPanel").style.display="block"; document.getElementById("signupPanel").style.display="none"; });
    document.getElementById("authSignupTab")?.addEventListener("click", () => { document.getElementById("loginPanel").style.display="none"; document.getElementById("signupPanel").style.display="block"; });
    document.getElementById("doLoginBtn")?.addEventListener("click", async() => { try{ await signInWithEmailAndPassword(auth, document.getElementById("loginEmail").value, document.getElementById("loginPass").value); document.getElementById("authModal").style.display="none"; }catch(e){ showToast(e.message); } });
    document.getElementById("doSignupBtn")?.addEventListener("click", async() => { const name=document.getElementById("signupName").value; const email=document.getElementById("signupEmail").value; const pass=document.getElementById("signupPass").value; if(pass.length<6) return; const cred=await createUserWithEmailAndPassword(auth,email,pass); await updateProfile(cred.user,{displayName:name}); showToast("Channel created!"); });
    document.getElementById("googleLoginBtn")?.addEventListener("click", async() => { await signInWithPopup(auth, googleProvider); document.getElementById("authModal").style.display="none"; });
    window.closeUploadModal = () => document.getElementById("uploadModal").style.display = "none";
    document.getElementById("confirmUploadBtn")?.addEventListener("click", () => window.publishVideo());
    window.addEventListener("hashchange", () => renderApp());
    function escapeHtml(s){ if(!s) return ""; return s.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    renderApp();
</script>
</body>
</html>
